<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GUESS PowerPoint Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        button {
            background-color: #d00d2d;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        button:hover {
            background-color: #b00a24;
        }
        .status {
            margin-top: 15px;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>GUESS Online Turnaround Strategy</h2>
        <p>PowerPoint PPTX Generation Tool</p>
        <button id="generateBtn">PPT 다운로드</button>
        <div class="status" id="statusText">버튼을 클릭하면 PPTX 생성이 시작됩니다.</div>
    </div>
    <script>
        document.getElementById('generateBtn').addEventListener('click', generatePPT);
        
        // Auto-run when opened in browser subagent
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(generatePPT, 1000);
        });

        function generatePPT() {
            document.getElementById('statusText').innerText = "PPTX 생성 중...";
            
            try {
                let pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_16x9';

                // --- SLIDE 1: TITLE SLIDE (Dark Navy) ---
                let slide1 = pptx.addSlide();
                slide1.background = { color: '0B132B' };
                
                // Red Accent line
                slide1.addShape(pptx.ShapeType.rect, { x: 0.8, y: 1.5, w: 0.8, h: 0.08, fill: { color: 'D00D2D' } });
                
                // Title
                slide1.addText("GUESS ONLINE TURNAROUND", { 
                    x: 0.8, y: 1.8, w: 8.4, h: 1.0, 
                    fontSize: 36, bold: true, color: 'FFFFFF', fontFace: 'Segoe UI' 
                });
                
                // Subtitle
                slide1.addText("온라인 수익성 개선 및 브랜드 재구축 전략", { 
                    x: 0.8, y: 2.8, w: 8.4, h: 0.6, 
                    fontSize: 20, bold: true, color: 'E2E8F0', fontFace: '맑은 고딕' 
                });
                
                // Metadata
                slide1.addText("작성일: 2026년 6월  |  보고 대상: 경영진 및 C-Level 리더십", { 
                    x: 0.8, y: 4.5, w: 8.4, h: 0.4, 
                    fontSize: 11, color: '94A3B8', fontFace: '맑은 고딕' 
                });

                // --- COMMON CONTENT SLIDE HEADER HELPER ---
                function addHeader(slide, title, eyebrow) {
                    // Background
                    slide.background = { color: 'F8FAFC' };
                    // Red accent block
                    slide.addShape(pptx.ShapeType.rect, { x: 0.5, y: 0.4, w: 0.1, h: 0.3, fill: { color: 'D00D2D' } });
                    // Eyebrow
                    slide.addText(eyebrow || "GUESS ONLINE TURNAROUND STRATEGY", {
                        x: 0.7, y: 0.32, w: 8.0, h: 0.2,
                        fontSize: 9, bold: true, color: 'D00D2D', fontFace: 'Segoe UI'
                    });
                    // Title
                    slide.addText(title, {
                        x: 0.7, y: 0.5, w: 8.0, h: 0.4,
                        fontSize: 18, bold: true, color: '0B132B', fontFace: '맑은 고딕'
                    });
                }

                // --- SLIDE 2: 핵심 요약 (EXECUTIVE SUMMARY) ---
                let slide2 = pptx.addSlide();
                addHeader(slide2, "핵심 요약 (Executive Summary)", "KEY SUMMARY");
                
                // Left Card: Current Issues
                slide2.addShape(pptx.ShapeType.roundRect, { 
                    x: 0.5, y: 1.1, w: 4.3, h: 3.9, 
                    fill: { color: 'FFF1F2' }, line: { color: 'FDA4AF', width: 1 }, rectRadius: 8
                });
                slide2.addText("현 구조의 한계 및 문제점", {
                    x: 0.8, y: 1.3, w: 3.7, h: 0.4,
                    fontSize: 14, bold: true, color: '9F1239', fontFace: '맑은 고딕'
                });
                slide2.addText([
                    { text: "• 홈쇼핑/아울렛 중심의 저단가 할인 판매 의존\n", options: { bullet: true, color: '4C0519', fontSize: 11, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "• 브랜드 이미지 노후화 및 4050 세대 편중\n", options: { bullet: true, color: '4C0519', fontSize: 11, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "• 백화점 오프라인 채널 정체와 ASP 하락", options: { bullet: true, color: '4C0519', fontSize: 11, fontFace: '맑은 고딕' } }
                ], { x: 0.8, y: 1.8, w: 3.7, h: 3.0 });

                // Right Card: Future Solutions
                slide2.addShape(pptx.ShapeType.roundRect, { 
                    x: 5.2, y: 1.1, w: 4.3, h: 3.9, 
                    fill: { color: 'F0FDF4' }, line: { color: 'A7F3D0', width: 1 }, rectRadius: 8
                });
                slide2.addText("온라인 통합 마스터플랜 방향성", {
                    x: 5.5, y: 1.3, w: 3.7, h: 0.4,
                    fontSize: 14, bold: true, color: '166534', fontFace: '맑은 고딕'
                });
                slide2.addText([
                    { text: "• 온라인 유통 채널 3원화 관리 (채널 카니발 차단)\n", options: { bullet: true, color: '062F16', fontSize: 11, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "• 고감도 콘텐츠 및 한정판/스트리트 콜라보 전개\n", options: { bullet: true, color: '062F16', fontSize: 11, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "• No-Sale 원칙 기반 할인 없는 제값 판매 구조 안착\n", options: { bullet: true, color: '062F16', fontSize: 11, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "• 젊은 MZ 신규 고객 확보 및 브랜드 가치 쇄신", options: { bullet: true, color: '062F16', fontSize: 11, fontFace: '맑은 고딕' } }
                ], { x: 5.5, y: 1.8, w: 3.7, h: 3.0 });


                // --- SLIDE 3: 현황 및 핵심 문제 진단 ---
                let slide3 = pptx.addSlide();
                addHeader(slide3, "1. 현황 및 핵심 문제 진단 (Context & Problem)", "01. CONTEXT & PROBLEM");

                let problems = [
                    {
                        title: "채널 양극화 & 백화점 정체",
                        desc: "백화점 오프라인 매출 감소세를 아울렛·홈쇼핑 중심의 매출로 방어함에 따라, 브랜드 단가(ASP)가 지속적으로 훼손되는 정체기에 직면해 있습니다."
                    },
                    {
                        title: "브랜드 이미지 노후화",
                        desc: "저단가 대량 판매 및 홈쇼핑 중심의 잦은 노출로 인해, 젊은 세대 사이에서 '4050 타깃의 올드한 브랜드'라는 인식이 깊어지고 있습니다."
                    },
                    {
                        title: "버티컬 플랫폼 성장 정체",
                        desc: "Gen-Z가 밀집한 패션 버티컬몰(무신사/29CM 등)에서 독자적인 감성 구축에 실패하고, 데님 하의 외 카테고리 확장이 지연되고 있습니다."
                    }
                ];

                problems.forEach((p, idx) => {
                    let colX = 0.5 + (idx * 3.1);
                    slide3.addShape(pptx.ShapeType.roundRect, {
                        x: colX, y: 1.2, w: 2.8, h: 3.8,
                        fill: { color: 'FFFFFF' }, line: { color: 'E2E8F0', width: 1 }, rectRadius: 6
                    });
                    
                    // Card header icon/number
                    slide3.addText(`0${idx + 1}`, {
                        x: colX + 0.2, y: 1.4, w: 2.4, h: 0.3,
                        fontSize: 16, bold: true, color: 'D00D2D', fontFace: 'Segoe UI'
                    });
                    
                    // Card title
                    slide3.addText(p.title, {
                        x: colX + 0.2, y: 1.8, w: 2.4, h: 0.6,
                        fontSize: 13, bold: true, color: '0B132B', fontFace: '맑은 고딕'
                    });
                    
                    // Card body
                    slide3.addText(p.desc, {
                        x: colX + 0.2, y: 2.5, w: 2.4, h: 2.2,
                        fontSize: 10, color: '475569', fontFace: '맑은 고딕', lineSpacing: 16
                    });
                });


                // --- SLIDE 4: 핵심 전략 방향: 투 트랙 마스터플랜 ---
                let slide4 = pptx.addSlide();
                addHeader(slide4, "2. 핵심 전략 방향: 투 트랙(Dual-Track) 마스터플랜", "02. CORE STRATEGY");

                // Table rows
                let tableRows = [
                    [
                        { text: "구분", options: { bold: true, color: 'FFFFFF', fill: { color: '0B132B' }, align: 'center', valign: 'middle' } },
                        { text: "안정 매출 축 (Volume & Cash Cow)", options: { bold: true, color: 'FFFFFF', fill: { color: '0B132B' }, align: 'center', valign: 'middle' } },
                        { text: "브랜드 턴어라운드 축 (Value & Margin)", options: { bold: true, color: 'FFFFFF', fill: { color: 'D00D2D' }, align: 'center', valign: 'middle' } }
                    ],
                    [
                        { text: "대상 채널", options: { bold: true, fill: { color: 'F1F5F9' }, align: 'center', valign: 'middle' } },
                        { text: "홈쇼핑, 오프라인 아울렛, 종합몰 기본물", options: { fill: { color: 'FFFFFF' }, align: 'center', valign: 'middle' } },
                        { text: "자사몰(D2C), 패션 전문 버티컬몰 (무신사/29CM)", options: { bold: true, fill: { color: 'FFF5F5' }, align: 'center', valign: 'middle' } }
                    ],
                    [
                        { text: "운영 목적", options: { bold: true, fill: { color: 'F1F5F9' }, align: 'center', valign: 'middle' } },
                        { text: "대중적 볼륨 유지 및 안정적 현금 흐름 확보", options: { fill: { color: 'FFFFFF' }, align: 'center', valign: 'middle' } },
                        { text: "MZ 신규 고객 유입, 고단가(ASP) 회복, 마진 극대화", options: { bold: true, fill: { color: 'FFF5F5' }, align: 'center', valign: 'middle' } }
                    ],
                    [
                        { text: "가격 정책", options: { bold: true, fill: { color: 'F1F5F9' }, align: 'center', valign: 'middle' } },
                        { text: "상시 쿠폰 매칭, 이월 상품 할인 전개", options: { fill: { color: 'FFFFFF' }, align: 'center', valign: 'middle' } },
                        { text: "No-Sale 정책 고수 (정상가 판매율 95% 이상)", options: { bold: true, fill: { color: 'FFF5F5' }, align: 'center', valign: 'middle' } }
                    ]
                ];

                slide4.addTable(tableRows, {
                    x: 0.5, y: 1.3, w: 9.0, rowH: [0.6, 0.9, 0.9, 0.9],
                    colW: [1.8, 3.6, 3.6],
                    border: { type: 'solid', pt: 1, color: 'E2E8F0' },
                    fontSize: 10,
                    fontFace: '맑은 고딕',
                    valign: 'middle'
                });


                // --- SLIDE 5: 외부몰 및 D2C 유통 채널 3원화 전략 ---
                let slide5 = pptx.addSlide();
                addHeader(slide5, "3. 외부몰 및 D2C 유통 채널 3원화 전략", "03. DISTRIBUTION CHANNEL");

                let tiers = [
                    {
                        title: "① 패션 전문 버티컬몰",
                        subtitle: "무신사 / 29CM / W컨셉",
                        isHighlight: true,
                        bullets: [
                            { text: "• 브랜드 이미지 리포지셔닝 전초기지\n", options: { color: '1E293B', fontSize: 10, fontFace: '맑은 고딕', breakLine: true } },
                            { text: "• 90s 아카이브 한정판 & 전용 캡슐 독점\n", options: { color: '1E293B', fontSize: 10, fontFace: '맑은 고딕', breakLine: true } },
                            { text: "• 정상가 판매(No-Sale)로 프리미엄 인식 구축", options: { color: '1E293B', fontSize: 10, fontFace: '맑은 고딕' } }
                        ]
                    },
                    {
                        title: "② 백화점 종합몰",
                        subtitle: "SSG / 롯데온 / 현대H몰 등",
                        isHighlight: false,
                        bullets: [
                            { text: "• 백화점 리테일 오프라인 가치 보완\n", options: { color: '475569', fontSize: 10, fontFace: '맑은 고딕', breakLine: true } },
                            { text: "• 프리미엄 라인 (Marciano, Luxe 등) 중심\n", options: { color: '475569', fontSize: 10, fontFace: '맑은 고딕', breakLine: true } },
                            { text: "• 실시간 재고 연동 및 정상 단가 유지", options: { color: '475569', fontSize: 10, fontFace: '맑은 고딕' } }
                        ]
                    },
                    {
                        title: "③ 오픈마켓 & 소셜",
                        subtitle: "쿠팡 / 네이버 스마트스토어 등",
                        isHighlight: false,
                        bullets: [
                            { text: "• 기본 코어 아이템 및 이월 소진 채널\n", options: { color: '475569', fontSize: 10, fontFace: '맑은 고딕', breakLine: true } },
                            { text: "• 대중적 기본물 및 이월 재고 제한적 노출\n", options: { color: '475569', fontSize: 10, fontFace: '맑은 고딕', breakLine: true } },
                            { text: "• 콜라보/프리미엄 노출 차단으로 가격 오염 방지", options: { color: '475569', fontSize: 10, fontFace: '맑은 고딕' } }
                        ]
                    }
                ];

                tiers.forEach((t, idx) => {
                    let colX = 0.5 + (idx * 3.1);
                    slide5.addShape(pptx.ShapeType.roundRect, {
                        x: colX, y: 1.2, w: 2.8, h: 3.8,
                        fill: { color: 'FFFFFF' }, 
                        line: { color: t.isHighlight ? 'D00D2D' : 'E2E8F0', width: t.isHighlight ? 2 : 1 }, 
                        rectRadius: 6
                    });

                    // Highlight banner
                    if (t.isHighlight) {
                        slide5.addShape(pptx.ShapeType.rect, {
                            x: colX + 0.1, y: 1.3, w: 2.6, h: 0.35,
                            fill: { color: 'D00D2D' }
                        });
                        slide5.addText("FOCUS CHANNEL", {
                            x: colX + 0.1, y: 1.38, w: 2.6, h: 0.2,
                            fontSize: 9, bold: true, color: 'FFFFFF', align: 'center', fontFace: 'Segoe UI'
                        });
                    }

                    let startY = t.isHighlight ? 1.8 : 1.4;

                    slide5.addText(t.title, {
                        x: colX + 0.2, y: startY, w: 2.4, h: 0.3,
                        fontSize: 12, bold: true, color: t.isHighlight ? 'D00D2D' : '0B132B', fontFace: '맑은 고딕'
                    });

                    slide5.addText(t.subtitle, {
                        x: colX + 0.2, y: startY + 0.25, w: 2.4, h: 0.2,
                        fontSize: 9, color: '94A3B8', fontFace: '맑은 고딕'
                    });

                    // Add line separator
                    slide5.addShape(pptx.ShapeType.rect, {
                        x: colX + 0.2, y: startY + 0.55, w: 2.4, h: 0.02,
                        fill: { color: 'E2E8F0' }
                    });

                    slide5.addText(t.bullets, {
                        x: colX + 0.2, y: startY + 0.7, w: 2.4, h: 2.0,
                        lineSpacing: 16
                    });
                });


                // --- SLIDE 6: 상품 콘텐츠 혁신: '뾰족한' 킬러 아이템 전개 ---
                let slide6 = pptx.addSlide();
                addHeader(slide6, "4. 상품 콘텐츠 혁신: '뾰족한' 킬러 아이템 전개", "04. PRODUCT INNOVATION");

                // Left Card: Collaboration
                slide6.addShape(pptx.ShapeType.roundRect, {
                    x: 0.5, y: 1.2, w: 4.3, h: 3.8,
                    fill: { color: 'FFFFFF' }, line: { color: 'E2E8F0', width: 1 }, rectRadius: 6
                });
                slide6.addText("'90s 빈티지 아카이브' & '힙 스트리트' 콜라보", {
                    x: 0.8, y: 1.4, w: 3.7, h: 0.4,
                    fontSize: 13, bold: true, color: '0B132B', fontFace: '맑은 고딕'
                });
                slide6.addText([
                    { text: "• 헤리티지 극대화:\n", options: { bold: true, color: 'D00D2D', fontSize: 11, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "  게스 고유의 80-90년대 삼각 로고 디테일 및 레트로 데님 워싱을 부각합니다.\n\n", options: { color: '475569', fontSize: 10, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "• 도메스틱 디자이너 브랜드 협업:\n", options: { bold: true, color: 'D00D2D', fontSize: 11, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "  현재 MZ 세대가 열광하는 힙한 스트리트 디자이너 브랜드와 협업 캡슐 전개.\n\n", options: { color: '475569', fontSize: 10, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "• 소장 가치 제고:\n", options: { bold: true, color: 'D00D2D', fontSize: 11, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "  한정 수량 캡슐 라인으로 패션 고관여층 유입 촉진.", options: { color: '475569', fontSize: 10, fontFace: '맑은 고딕' } }
                ], { x: 0.8, y: 1.8, w: 3.7, h: 3.0 });

                // Right Card: Category Repositioning
                slide6.addShape(pptx.ShapeType.roundRect, {
                    x: 5.2, y: 1.2, w: 4.3, h: 3.8,
                    fill: { color: 'FFFFFF' }, line: { color: 'E2E8F0', width: 1 }, rectRadius: 6
                });
                slide6.addText("카테고리 리포지셔닝 (하의 중심 → 상의·잡화)", {
                    x: 5.5, y: 1.4, w: 3.7, h: 0.4,
                    fontSize: 13, bold: true, color: '0B132B', fontFace: '맑은 고딕'
                });
                slide6.addText([
                    { text: "• 데님 코어 하의 경쟁력 유지:\n", options: { bold: true, color: '0B132B', fontSize: 11, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "  전통적 강점인 데님 팬츠의 오리지널리티 및 핏, 품질 수준은 흔들림 없이 유지합니다.\n\n", options: { color: '475569', fontSize: 10, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "• 상의 및 잡화 카테고리 쇄신:\n", options: { bold: true, color: '0B132B', fontSize: 11, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "  크롭 탑, 그래픽 티셔츠, Y2K 니트, 볼캡 및 미니백을 스트리트 감성으로 리디자인.\n\n", options: { color: '475569', fontSize: 10, fontFace: '맑은 고딕', breakLine: true } },
                    { text: "• 첫 구매 허들 완화:\n", options: { bold: true, color: '0B132B', fontSize: 11, fontFace: '맑은 고딕', breakLine: true } },
